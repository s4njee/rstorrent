# Build and publish the desktop app for macOS and Windows.
#
# Produces two artifacts:
#   * macOS   — rstorrent-macos.zip          (the .app bundle, zipped with ditto)
#   * Windows — rstorrent-<ver>-setup.exe     (the NSIS installer)
#
# Triggers:
#   * a version tag `v*` → builds both and attaches them to a GitHub Release.
#   * manual dispatch    → builds both, downloadable as workflow artifacts.
#
# The macOS .app is Apple-Silicon (the runner arch) and unsigned — Gatekeeper
# will warn on first launch; ad-hoc signing is fine for now (see docs/release.md).
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Needed to create the Release and upload assets on a tag.
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            bundles: app
          - os: windows-latest
            label: Windows
            bundles: nsis
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      # `tauri build` runs the frontend build (beforeBuildCommand) then bundles
      # just the target we want for this platform.
      - name: Build desktop app
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      # --- Package: macOS → a .zip of the .app; Windows → the NSIS .exe ---
      # The bundle path is found by glob so it works whether Tauri writes under
      # the workspace `target/` or `src-tauri/target/`.
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          app=$(find . -path '*release/bundle/macos/rstorrent.app' -type d | head -1)
          if [ -z "$app" ]; then echo "::error::no .app bundle found"; exit 1; fi
          ditto -c -k --sequesterRsrc --keepParent "$app" "rstorrent-macos.zip"
          echo "ARTIFACT=rstorrent-macos.zip" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          exe=$(find . -path '*release/bundle/nsis/*-setup.exe' | head -1)
          if [ -z "$exe" ]; then echo "::error::no NSIS installer found"; exit 1; fi
          echo "ARTIFACT=$(basename "$exe")" >> "$GITHUB_ENV"
          cp "$exe" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rstorrent-${{ runner.os }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

      # On a tag, publish to the GitHub Release. Both matrix jobs target the same
      # release: the first creates it, the second finds it already there.
      - name: Publish to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" --generate-notes --verify-tag \
            || echo "release already exists"
          gh release upload "$GITHUB_REF_NAME" "$ARTIFACT" --clobber

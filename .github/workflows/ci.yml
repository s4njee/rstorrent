# CI for rstorrent (C21).
#
# Three jobs, split by what they actually need:
#
#   frontend — pure Node, so it runs on Linux where runners are fastest.
#   crate    — `rtorrent-core`, the shared client layer, is Tauri-free and
#              builds anywhere, so it gets fmt/clippy/tests on Linux (cheap and
#              fast). A PR touching only crates/rtorrent gets Linux-speed feedback.
#   desktop  — the `rstorrent` Tauri app runs on macOS because that's where its
#              webview and Keychain backend (`security-framework`, via `keyring`)
#              are real; building it on Linux would test a config nobody ships.
#
# Formatting is checked once, workspace-wide, in the (cheaper) crate job.
#
# The desktop job deliberately does NOT build the frontend first. `cargo test`
# only needs `tauri.conf.json`, not the `../dist` output it points at.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to a PR makes the in-flight run irrelevant; don't pay for it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: frontend (lint, types, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` (not `install`) so the lockfile is authoritative and a drifted
      # lockfile fails here rather than resolving to something else silently.
      - run: npm ci

      - name: Lint (eslint + prettier)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Catches breakage that tsc alone misses — an unresolved import, a bad
      # asset reference — before it reaches a release build.
      - name: Build frontend
        run: npm run build

  crate:
    name: crate + server (Linux — fmt, clippy, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      # Formatting is platform-independent — check the whole workspace here so
      # the macOS job doesn't have to.
      - name: Formatting (workspace)
        run: cargo fmt --check --all

      # The shared crate and the web server are both Tauri-free, so they build,
      # lint, and test on Linux.
      - name: Clippy
        run: cargo clippy -p rtorrent-core -p rstorrent-web --all-targets -- -D warnings

      - name: Tests
        run: cargo test -p rtorrent-core -p rstorrent-web

      # Build the web SPA the server embeds, so a broken web build fails here.
      - name: Build web UI
        run: npm ci && npm run build:web

  desktop:
    name: desktop app (macOS — clippy, tests)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Caches ~/.cargo and the workspace target/. Keyed on the lockfile; a cold
      # cache just means a slower run, never a wrong one.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Clippy
        run: cargo clippy -p rstorrent --all-targets -- -D warnings

      # Tests marked #[ignore] need a live rtorrent daemon or the macOS
      # Keychain, so they stay out of CI and are run by hand — see
      # docs/rtorrent-setup.md.
      - name: Tests
        run: cargo test -p rstorrent
